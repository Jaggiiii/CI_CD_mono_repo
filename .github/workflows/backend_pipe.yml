name: backend pipeline
on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
    paths-ignore:
      - 'backend/**/*.md'

defaults:
  run:
    working-directory: backend
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
     - name: Checkout code
       uses: actions/checkout@v3
     - name: Set up node js
       uses: actions/setup-node@v3
       with:
         node-version: 20
     - name: Install dependencies
       run: npm ci
     - name: Runs tests
       run: npm test
     - name: run lint
       run: npm run lint
     - name: run build
       run: npm run build